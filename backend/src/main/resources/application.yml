spring:
  application:
    name: ai-interview-backend

  # ── R2DBC (async PostgreSQL for the app) ────────────────────────────────
  r2dbc:
    url: ${DATABASE_URL:r2dbc:postgresql://localhost:5432/aiinterview}
    username: ${POSTGRES_USER:aiinterview}
    password: ${POSTGRES_PASSWORD:changeme}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20

  # ── Flyway (migrations via JDBC — Flyway does not support R2DBC) ─────────
  # Spring Boot will auto-configure Flyway using these JDBC credentials
  # while the app itself uses R2DBC for all runtime DB access.
  flyway:
    url: ${FLYWAY_URL:jdbc:postgresql://localhost:5432/aiinterview}
    user: ${POSTGRES_USER:aiinterview}
    password: ${POSTGRES_PASSWORD:changeme}
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  # ── Security (permit /health and /ws/** without auth) ───────────────────
  security:
    user:
      name: admin
      password: disabled  # real auth handled by ClerkJwtAuthFilter

server:
  port: 8080

# ── Actuator health endpoint ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Clerk JWT validation ─────────────────────────────────────────────────────
clerk:
  jwks-url: ${CLERK_JWKS_URL:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}
  publishable-key: ${CLERK_PUBLISHABLE_KEY:}
  jwks-cache-ttl-minutes: 60

# ── LLM Provider ─────────────────────────────────────────────────────────────
# Active provider: openai | groq | gemini
llm:
  provider: ${LLM_PROVIDER:openai}
  fallback-provider: ${LLM_FALLBACK_PROVIDER:}

  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}

  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

  # Resolved models — agents inject from here
  # Override per-model via env vars; defaults match openai
  # For groq: set LLM_INTERVIEWER_MODEL=llama-3.3-70b-versatile etc.
  # For gemini: set LLM_INTERVIEWER_MODEL=gemini-1.5-pro etc.
  resolved:
    interviewer-model: ${LLM_INTERVIEWER_MODEL:gpt-4o}
    background-model: ${LLM_BACKGROUND_MODEL:gpt-4o-mini}
    generator-model: ${LLM_GENERATOR_MODEL:gpt-4o}
    evaluator-model: ${LLM_EVALUATOR_MODEL:gpt-4o}

# ── Interview business rules ──────────────────────────────────────────────────
interview:
  free-tier-limit: 3
  redis-ttl-hours: 2
  transcript-max-turns: 6

# ── Rate limiting ─────────────────────────────────────────────────────────────
rate-limit:
  requests-per-minute: 60

# ── CORS ──────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── App ─────────────────────────────────────────────────────────────────────
app:
  websocket:
    base-url: ${WS_BASE_URL:ws://localhost:8080}

# ── Judge0 ──────────────────────────────────────────────────────────────────
judge0:
  base-url: ${JUDGE0_BASE_URL:http://localhost:2358}
  auth-token: ${JUDGE0_AUTH_TOKEN:judge0_dev_token_replace_in_production}
  auth-header: ${JUDGE0_AUTH_HEADER:X-Auth-Token}
  poll-interval-ms: 500
  poll-timeout-seconds: 30

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.aiinterview: DEBUG
    org.springframework.security: INFO
    org.springframework.r2dbc: INFO
