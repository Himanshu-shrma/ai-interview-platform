spring:
  application:
    name: ai-interview-backend

  # ── R2DBC (async PostgreSQL for the app) ────────────────────────────────
  r2dbc:
    url: ${DATABASE_URL:r2dbc:postgresql://localhost:5432/aiinterview}
    username: ${POSTGRES_USER:aiinterview}
    password: ${POSTGRES_PASSWORD:changeme}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20

  # ── Flyway (migrations via JDBC — Flyway does not support R2DBC) ─────────
  # Spring Boot will auto-configure Flyway using these JDBC credentials
  # while the app itself uses R2DBC for all runtime DB access.
  flyway:
    url: ${FLYWAY_URL:jdbc:postgresql://localhost:5432/aiinterview}
    user: ${POSTGRES_USER:aiinterview}
    password: ${POSTGRES_PASSWORD:changeme}
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  # ── Security (permit /health and /ws/** without auth) ───────────────────
  security:
    user:
      name: admin
      password: disabled  # real auth handled by ClerkJwtAuthFilter

server:
  port: 8080

# ── Actuator health endpoint ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Clerk JWT validation ─────────────────────────────────────────────────────
clerk:
  jwks-url: ${CLERK_JWKS_URL:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}
  publishable-key: ${CLERK_PUBLISHABLE_KEY:}
  jwks-cache-ttl-minutes: 60

# ── OpenAI ──────────────────────────────────────────────────────────────────
openai:
  api-key: ${OPENAI_API_KEY:}
  model:
    interviewer: gpt-4o
    background: gpt-4o-mini
    generator: gpt-4o
  max-tokens: 1000
  timeout-seconds: 30

# ── Interview business rules ──────────────────────────────────────────────────
interview:
  free-tier-limit: 3
  redis-ttl-hours: 2

# ── Rate limiting ─────────────────────────────────────────────────────────────
rate-limit:
  requests-per-minute: 60

# ── CORS ──────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── App ─────────────────────────────────────────────────────────────────────
app:
  websocket:
    base-url: ${WS_BASE_URL:ws://localhost:8080}

# ── Judge0 ──────────────────────────────────────────────────────────────────
judge0:
  base-url: ${JUDGE0_BASE_URL:http://localhost:2358}
  auth-token: ${JUDGE0_AUTH_TOKEN:judge0_dev_token_replace_in_production}
  auth-header: ${JUDGE0_AUTH_HEADER:X-Auth-Token}

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.aiinterview: DEBUG
    org.springframework.security: INFO
    org.springframework.r2dbc: INFO
