# Judge0 CE Configuration
# ─────────────────────────────────────────────────────────────────────────────
# This file is mounted read-only into the judge0-server and judge0-worker
# containers at /judge0.conf. It configures Judge0's internal DB and Redis.
#
# In the root docker-compose.yml the internal services are named:
#   judge0-db    → Judge0's PostgreSQL
#   judge0-redis → Judge0's Redis (job queue)
#
# In judge0/docker-compose.yml (standalone mode) the same names are used.
# ─────────────────────────────────────────────────────────────────────────────

# PostgreSQL (Judge0's own database — not the app DB)
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0secret

# Redis (Judge0's Resque job queue — not the app Redis)
REDIS_HOST=judge0-redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0secret

# Authentication
# Set AUTHN_HEADER and AUTHN_TOKEN to require an API key on all Judge0 calls.
# The backend sends this token in the configured header for every submission.
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=judge0_dev_token_replace_in_production

# Judge0 Runtime Settings
RAILS_ENV=production
RACK_ENV=production

# How often (seconds) workers poll for new jobs
INTERVAL=0.1

# Max jobs allowed in queue before returning 503
MAX_QUEUE_SIZE=100

# Timeouts (seconds)
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=128000
STACK_LIMIT=64000
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_FILE_SIZE=1024

# Number of runs per submission (used for custom test cases)
NUMBER_OF_RUNS=1

# Callbacks (leave blank — we poll instead)
CALLBACKS_MAX_TRIES=3
CALLBACKS_TIMEOUT=10
