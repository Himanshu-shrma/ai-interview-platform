# Judge0 CE — Standalone Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Run Judge0 in isolation (without the full app stack):
#   cd judge0 && docker-compose up -d
#
# Exposes Judge0 API on http://localhost:2358
# Uses the same judge0.conf as the root compose.
# ─────────────────────────────────────────────────────────────────────────────

services:

  judge0-server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: unless-stopped
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-worker:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: unless-stopped
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0secret
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  judge0-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass judge0secret
    volumes:
      - judge0_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "judge0secret", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  judge0_postgres_data:
  judge0_redis_data:
